<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Akademik - PTIK UNS</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  />
  <link rel="stylesheet" href="style.css" />

  <style>
    .agenda-section {
      min-height: 100vh;
      padding: 160px 0 80px;
      background: #f2f2f2;
    }

    .agenda-box {
      background: #ffffff;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .agenda-title {
      font-size: 2.4rem;
      font-weight: 800;
      color: #021748;
      margin-bottom: 10px;
    }

    .agenda-desc {
      color: #555;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .pdf-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
    }

    .btn-agenda {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 22px;
      background: #021748;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-agenda:hover {
      background: #45005b;
      color: #ffffff;
    }

    .pdf-viewer {
      width: 100%;
      height: 900px;
      border: 1px solid #ddd;
    }

    @media (max-width: 991px) {
      .agenda-section {
        padding: 145px 0 60px;
      }

      .agenda-box {
        padding: 24px;
      }

      .agenda-title {
        font-size: 2rem;
      }

      .pdf-viewer {
        height: 700px;
      }
    }

    @media (max-width: 767px) {
      .agenda-section {
        padding: 135px 0 40px;
      }

      .agenda-title {
        font-size: 1.6rem;
      }

      .pdf-viewer {
        height: 500px;
      }

      .btn-agenda {
        width: 100%;
      }
    }
  </style>
</head>

<body id="top">
  <!-- TOPBAR -->
  <div id="topbar" class="topbar fixed-top">
    <div class="container d-flex justify-content-between align-items-center py-2 flex-wrap">
      <div class="d-flex align-items-center gap-2">
        <button id="idBtn" class="flag-btn active-lang" type="button">
          <img src="assets/indonesia.png" alt="Indonesia" />
        </button>

        <button id="enBtn" class="flag-btn" type="button">
          <img src="assets/inggris.png" alt="English" />
        </button>
      </div>

      <div class="d-flex flex-wrap gap-4 fw-bold top-links">
        <a href="public-info.html">Informasi Publik</a>
        <a href="integrity-zone.html">Zona Integritas</a>
        <a href="agenda.html">Agenda</a>
        <a href="contacts.html">Kontak</a>
      </div>
    </div>
  </div>

  <!-- MAIN NAVBAR -->
  <nav id="mainNavbar" class="navbar navbar-expand-lg navbar-dark main-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.htm">
        <img src="assets/logoptik.png" alt="Logo PTIK" class="logo-img" />
      </a>

      <button
        class="navbar-toggler border-0 shadow-none"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarMenu"
        aria-controls="navbarMenu"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMenu">
        <ul class="navbar-nav ms-auto gap-lg-3">
          <li class="nav-item">
            <a class="nav-link nav-custom" href="index.htm">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link nav-custom active" href="agenda.html">Agenda</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- AGENDA CONTENT -->
  <section class="agenda-section">
    <div class="container">
      <div class="agenda-box">
        <h1 class="agenda-title">Kalender Akademik</h1>

        <p class="agenda-desc">
          Berikut adalah dokumen kalender akademik yang dapat dilihat langsung ataupun diunduh.
        </p>

        <div class="pdf-toolbar">
          <a href="index.htm" class="btn-agenda">Kembali ke Beranda</a>
          <a href="assets/kalenderakademik.pdf" class="btn-agenda" download>
            Unduh PDF
          </a>
        </div>

        <iframe
          class="pdf-viewer"
          src="assets/kalenderakademik.pdf"
          title="Kalender Akademik PTIK UNS"
        ></iframe>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
